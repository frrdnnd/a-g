name: Auto Commit

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name 'auto-commit'
          git config --global user.email 'auto-commit@example.com'

      - name: Make changes
        run: |
          echo "Auto commit on $(date)" >> auto-commit.txt

      - name: Commit changes
        run: |
          git add auto-commit.txt
          git commit -m 'Auto commit by GitHub Actions' || echo 'No changes to commit'

      - name: Push changes
        run: |
          git push origin main
